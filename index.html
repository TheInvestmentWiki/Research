<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TheInvestmentWiki</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Source+Serif+4:ital,opsz,wght@0,8..60,400;0,8..60,600;1,8..60,400&family=DM+Sans:opsz,wght@9..40,400;9..40,500&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'DM Sans', -apple-system, BlinkMacSystemFont, sans-serif;
            background: #fafaf8;
            color: #1a1a1a;
            min-height: 100vh;
            -webkit-font-smoothing: antialiased;
        }

        .container {
            max-width: 860px;
            margin: 0 auto;
            padding: 0 32px;
        }

        header {
            padding: 96px 0 56px;
            border-bottom: 2px solid #1a1a1a;
            margin-bottom: 40px;
        }

        h1 {
            font-family: 'Source Serif 4', Georgia, serif;
            font-size: 44px;
            font-weight: 600;
            letter-spacing: -1px;
            margin-bottom: 12px;
            line-height: 1.1;
        }

        .subtitle {
            font-size: 17px;
            color: #777;
            line-height: 1.6;
            max-width: 480px;
        }

        .stats {
            display: flex;
            gap: 32px;
            margin-top: 28px;
            padding-top: 24px;
            border-top: 1px solid #e8e8e4;
        }

        .stat-value {
            font-size: 22px;
            font-weight: 500;
            color: #1a1a1a;
            line-height: 1;
        }

        .stat-label {
            font-size: 13px;
            color: #aaa;
            margin-top: 4px;
            letter-spacing: 0.3px;
        }

        .toolbar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 24px;
            gap: 16px;
        }

        .search-wrap {
            flex: 1;
            max-width: 340px;
            position: relative;
        }

        .search-wrap svg {
            position: absolute;
            left: 14px;
            top: 50%;
            transform: translateY(-50%);
            color: #bbb;
            pointer-events: none;
        }

        input[type="text"] {
            width: 100%;
            padding: 11px 16px 11px 42px;
            background: #fff;
            border: 1px solid #e0e0dc;
            border-radius: 8px;
            font-size: 15px;
            font-family: inherit;
            color: #1a1a1a;
            outline: none;
            transition: border-color 0.2s, box-shadow 0.2s;
        }

        input[type="text"]:focus {
            border-color: #1a1a1a;
            box-shadow: 0 0 0 3px rgba(26, 26, 26, 0.06);
        }

        input[type="text"]::placeholder { color: #c0c0bc; }

        .contribute-btn {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            padding: 11px 22px;
            background: #1a1a1a;
            border: none;
            border-radius: 8px;
            color: #fff;
            font-family: inherit;
            font-size: 14px;
            font-weight: 500;
            text-decoration: none;
            transition: background 0.2s;
            white-space: nowrap;
        }

        .contribute-btn:hover { background: #333; }

        /* File list */
        .files { list-style: none; }

        .files li { border-bottom: 1px solid #ededea; }
        .files li:first-child { border-top: 1px solid #ededea; }

        .files a {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 20px 4px;
            text-decoration: none;
            color: #1a1a1a;
            transition: all 0.15s;
        }

        .files a:hover { padding-left: 12px; }
        .files a:hover .file-name { color: #0055bb; }
        .files a:hover .arrow { opacity: 1; transform: translateX(0); }

        .file-left {
            display: flex;
            flex-direction: column;
            gap: 3px;
            min-width: 0;
        }

        .file-name {
            font-family: 'Source Serif 4', Georgia, serif;
            font-size: 18px;
            font-weight: 400;
            transition: color 0.15s;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .file-path {
            font-size: 13px;
            color: #bbb;
        }

        .file-right {
            display: flex;
            align-items: center;
            gap: 16px;
            flex-shrink: 0;
        }

        .file-size {
            font-size: 13px;
            color: #bbb;
            font-variant-numeric: tabular-nums;
        }

        .arrow {
            color: #0055bb;
            opacity: 0;
            transform: translateX(-4px);
            transition: all 0.15s;
        }

        .loading, .empty, .error-state {
            padding: 80px 0;
            text-align: center;
            color: #aaa;
            font-size: 15px;
        }

        .loading-dot {
            display: inline-block;
            animation: pulse 1.2s ease-in-out infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 0.3; }
            50% { opacity: 1; }
        }

        .config-notice {
            background: #fff;
            border: 1px solid #e8e4d8;
            border-left: 3px solid #c9a84c;
            border-radius: 4px;
            padding: 18px 20px;
            margin-bottom: 28px;
            font-size: 14px;
            color: #777;
            line-height: 1.7;
        }

        .config-notice code {
            font-family: SFMono-Regular, Menlo, Consolas, monospace;
            font-size: 13px;
            background: #f5f4f0;
            padding: 2px 6px;
            border-radius: 3px;
            color: #1a1a1a;
        }

        footer {
            padding: 36px 0;
            margin-top: 80px;
            border-top: 2px solid #1a1a1a;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 12px;
        }

        .footer-left { font-size: 13px; color: #bbb; }

        .footer-links { display: flex; gap: 20px; }

        .footer-links a {
            font-size: 13px;
            color: #aaa;
            text-decoration: none;
            transition: color 0.15s;
        }

        .footer-links a:hover { color: #1a1a1a; }

        @media (max-width: 600px) {
            .container { padding: 0 20px; }
            header { padding: 56px 0 36px; }
            h1 { font-size: 32px; }
            .stats { gap: 20px; }
            .toolbar { flex-direction: column; align-items: stretch; }
            .search-wrap { max-width: none; }
            .file-name { font-size: 16px; }
            .file-size { display: none; }
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>TheInvestmentWiki</h1>
            <p class="subtitle">Open source equity research, maintained by the community.</p>
            <div class="stats">
                <div>
                    <div class="stat-value" id="file-count">—</div>
                    <div class="stat-label">Reports</div>
                </div>
                <div>
                    <div class="stat-value" id="contributor-count">—</div>
                    <div class="stat-label">Contributors</div>
                </div>
                <div>
                    <div class="stat-value" id="last-updated">—</div>
                    <div class="stat-label">Last updated</div>
                </div>
            </div>
        </header>

        <div class="toolbar">
            <div class="search-wrap">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <circle cx="11" cy="11" r="8"/><path d="M21 21l-4.35-4.35"/>
                </svg>
                <input type="text" id="search" placeholder="Search reports..." oninput="filterFiles()">
            </div>
            <a class="contribute-btn" id="contribute-link" href="#" target="_blank">
                <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M12 5v14M5 12h14"/>
                </svg>
                Contribute
            </a>
        </div>

        <div class="config-notice" id="config-notice" style="display:none;">
            Set <code>REPO_OWNER</code> and <code>REPO_NAME</code> at the bottom of this file to connect your GitHub repo.
        </div>

        <div id="file-list">
            <div class="loading">
                <span class="loading-dot">Loading research files...</span>
            </div>
        </div>

        <footer>
            <div class="footer-left">TheInvestmentWiki</div>
            <div class="footer-links">
                <a id="github-link" href="#" target="_blank">GitHub</a>
            </div>
        </footer>
    </div>

    <script>
        // ============================================================
        //  CONFIGURATION
        // ============================================================
        const REPO_OWNER = 'TheInvestmentWiki';
        const REPO_NAME  = 'research';
        // ============================================================

        const API = `https://api.github.com/repos/${REPO_OWNER}/${REPO_NAME}/contents/`;
        const BASE = `https://${REPO_OWNER}.github.io/${REPO_NAME}/`;

        let allFiles = [];

        document.getElementById('contribute-link').href = `https://github.com/${REPO_OWNER}/${REPO_NAME}`;
        document.getElementById('github-link').href = `https://github.com/${REPO_OWNER}/${REPO_NAME}`;

        async function loadFiles() {
            const el = document.getElementById('file-list');

            if (REPO_OWNER === 'YOUR_GITHUB_USERNAME') {
                document.getElementById('config-notice').style.display = 'block';
                el.innerHTML = '';
                return;
            }

            try {
                const res = await fetch(API, { headers: { 'Accept': 'application/vnd.github.v3+json' } });
                if (!res.ok) throw new Error(res.status);
                const data = await res.json();

                allFiles = data.filter(f => f.name.endsWith('.html') && f.name.toLowerCase() !== 'index.html');
                document.getElementById('file-count').textContent = allFiles.length;

                try {
                    const c = await fetch(`https://api.github.com/repos/${REPO_OWNER}/${REPO_NAME}/commits?per_page=1`);
                    if (c.ok) {
                        const commits = await c.json();
                        if (commits[0]) {
                            document.getElementById('last-updated').textContent = new Date(commits[0].commit.committer.date)
                                .toLocaleDateString('en-US', { month: 'short', day: 'numeric' });
                        }
                    }
                } catch(e) {}

                try {
                    const r = await fetch(`https://api.github.com/repos/${REPO_OWNER}/${REPO_NAME}/contributors?per_page=100`);
                    if (r.ok) document.getElementById('contributor-count').textContent = (await r.json()).length;
                } catch(e) {}

                renderFiles(allFiles);
            } catch (e) {
                el.innerHTML = '<div class="error-state">Could not load files. Check that the repo is public.</div>';
            }
        }

        function renderFiles(files) {
            const el = document.getElementById('file-list');
            if (!files.length) {
                el.innerHTML = '<div class="empty">No reports yet.</div>';
                return;
            }

            const ul = document.createElement('ul');
            ul.className = 'files';

            files.forEach(f => {
                const li = document.createElement('li');
                const a = document.createElement('a');
                a.href = BASE + f.name;
                a.target = '_blank';

                const name = f.name
                    .replace('.html', '')
                    .replace(/[-_]/g, ' ')
                    .replace(/\b\w/g, c => c.toUpperCase());

                const size = f.size > 1024 * 1024
                    ? (f.size / (1024 * 1024)).toFixed(1) + ' MB'
                    : f.size > 1024
                    ? (f.size / 1024).toFixed(0) + ' KB'
                    : f.size + ' B';

                a.innerHTML = `
                    <div class="file-left">
                        <span class="file-name">${name}</span>
                        <span class="file-path">${f.name}</span>
                    </div>
                    <div class="file-right">
                        <span class="file-size">${size}</span>
                        <svg class="arrow" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <path d="M5 12h14M12 5l7 7-7 7"/>
                        </svg>
                    </div>
                `;

                li.appendChild(a);
                ul.appendChild(li);
            });

            el.innerHTML = '';
            el.appendChild(ul);
        }

        function filterFiles() {
            const q = document.getElementById('search').value.toLowerCase();
            renderFiles(allFiles.filter(f => f.name.toLowerCase().includes(q)));
        }

        loadFiles();
    </script>
</body>
</html>
