<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TheInvestmentWiki</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif;
            background: #ffffff;
            color: #1a1a1a;
            min-height: 100vh;
            -webkit-font-smoothing: antialiased;
        }

        .container {
            width: 72%;
            max-width: 1600px;
            min-width: 0;
            margin: 0 auto;
            padding: 0 32px;
        }

        header {
            padding: clamp(60px, 6vw, 120px) 0 clamp(36px, 3.5vw, 64px);
            border-bottom: 1px solid #e5e5e5;
            margin-bottom: clamp(28px, 3vw, 48px);
        }

        h1 {
            font-size: clamp(32px, 3.2vw, 56px);
            font-weight: 600;
            letter-spacing: -0.5px;
            margin-bottom: clamp(8px, 0.8vw, 14px);
        }

        .subtitle {
            font-size: clamp(16px, 1.2vw, 21px);
            color: #666;
            line-height: 1.5;
        }

        .stats {
            display: flex;
            gap: clamp(24px, 2.5vw, 48px);
            margin-top: clamp(20px, 2vw, 32px);
            font-size: clamp(15px, 1.1vw, 19px);
            color: #999;
        }

        .stats span strong {
            color: #1a1a1a;
            font-weight: 600;
        }

        .toolbar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: clamp(16px, 1.5vw, 28px);
            gap: 16px;
        }

        input[type="text"] {
            flex: 1;
            max-width: 400px;
            padding: clamp(10px, 0.8vw, 14px) clamp(12px, 1vw, 18px);
            border: 1px solid #e5e5e5;
            border-radius: 6px;
            font-size: clamp(15px, 1.1vw, 19px);
            font-family: inherit;
            color: #1a1a1a;
            outline: none;
        }

        input[type="text"]:focus {
            border-color: #1a1a1a;
        }

        input[type="text"]::placeholder {
            color: #bbb;
        }

        .toolbar a {
            font-size: clamp(14px, 1vw, 18px);
            color: #666;
            text-decoration: none;
            white-space: nowrap;
        }

        .toolbar a:hover {
            color: #1a1a1a;
        }

        /* File list */
        .files {
            list-style: none;
        }

        .files li {
            border-bottom: 1px solid #f0f0f0;
        }

        .files li:first-child {
            border-top: 1px solid #f0f0f0;
        }

        .files a {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: clamp(16px, 1.4vw, 28px) 0;
            text-decoration: none;
            color: #1a1a1a;
            font-size: clamp(16px, 1.2vw, 22px);
            transition: color 0.15s;
        }

        .files a:hover {
            color: #0066cc;
        }

        .files .meta {
            font-size: clamp(13px, 0.9vw, 17px);
            color: #bbb;
            font-variant-numeric: tabular-nums;
        }

        /* States */
        .loading, .empty, .error {
            padding: 80px 0;
            text-align: center;
            font-size: clamp(15px, 1.1vw, 19px);
            color: #999;
        }

        .config-notice {
            background: #fffbeb;
            border: 1px solid #f0e6c0;
            border-radius: 6px;
            padding: 18px;
            margin-bottom: 28px;
            font-size: clamp(14px, 1vw, 17px);
            color: #92700c;
            line-height: 1.6;
        }

        .config-notice code {
            font-family: SFMono-Regular, Menlo, monospace;
            font-size: 0.9em;
            background: rgba(0,0,0,0.05);
            padding: 1px 5px;
            border-radius: 3px;
        }

        footer {
            padding: clamp(28px, 2.5vw, 44px) 0;
            margin-top: clamp(48px, 5vw, 96px);
            border-top: 1px solid #e5e5e5;
            font-size: clamp(13px, 0.9vw, 16px);
            color: #bbb;
            display: flex;
            justify-content: space-between;
        }

        footer a {
            color: #999;
            text-decoration: none;
        }

        footer a:hover {
            color: #1a1a1a;
        }

        @media (max-width: 768px) {
            .container {
                width: 100%;
                padding: 0 24px;
            }
            .toolbar { flex-direction: column; align-items: stretch; }
            input[type="text"] { max-width: none; }
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>TheInvestmentWiki</h1>
            <p class="subtitle">Open source equity research, maintained by the community.</p>
            <div class="stats">
                <span><strong id="file-count">—</strong> reports</span>
                <span><strong id="contributor-count">—</strong> contributors</span>
                <span>updated <strong id="last-updated">—</strong></span>
            </div>
        </header>

        <div class="toolbar">
            <input type="text" id="search" placeholder="Search..." oninput="filterFiles()">
            <a id="contribute-link" href="#" target="_blank">+ Add research</a>
        </div>

        <div class="config-notice" id="config-notice" style="display:none;">
            Set <code>REPO_OWNER</code> and <code>REPO_NAME</code> at the bottom of this file to connect to your GitHub repo.
        </div>

        <div id="file-list">
            <div class="loading">Loading...</div>
        </div>

        <footer>
            <span>TheInvestmentWiki</span>
            <a id="github-link" href="#" target="_blank">GitHub</a>
        </footer>
    </div>

    <script>
        // ============================================================
        //  CONFIGURATION
        // ============================================================
        const REPO_OWNER = 'TheInvestmentWiki';
        const REPO_NAME  = 'research';
        // ============================================================

        const API = `https://api.github.com/repos/${REPO_OWNER}/${REPO_NAME}/contents/`;
        const BASE = `https://${REPO_OWNER}.github.io/${REPO_NAME}/`;

        let allFiles = [];

        document.getElementById('contribute-link').href = `https://github.com/${REPO_OWNER}/${REPO_NAME}`;
        document.getElementById('github-link').href = `https://github.com/${REPO_OWNER}/${REPO_NAME}`;

        async function loadFiles() {
            const el = document.getElementById('file-list');

            if (REPO_OWNER === 'YOUR_GITHUB_USERNAME') {
                document.getElementById('config-notice').style.display = 'block';
                el.innerHTML = '';
                return;
            }

            try {
                const res = await fetch(API, { headers: { 'Accept': 'application/vnd.github.v3+json' } });
                if (!res.ok) throw new Error(res.status);
                const data = await res.json();

                allFiles = data.filter(f => f.name.endsWith('.html') && f.name.toLowerCase() !== 'index.html');
                document.getElementById('file-count').textContent = allFiles.length;

                try {
                    const c = await fetch(`https://api.github.com/repos/${REPO_OWNER}/${REPO_NAME}/commits?per_page=1`);
                    if (c.ok) {
                        const commits = await c.json();
                        if (commits[0]) {
                            document.getElementById('last-updated').textContent = new Date(commits[0].commit.committer.date)
                                .toLocaleDateString('en-US', { month: 'short', day: 'numeric' });
                        }
                    }
                } catch(e) {}

                try {
                    const r = await fetch(`https://api.github.com/repos/${REPO_OWNER}/${REPO_NAME}/contributors?per_page=100`);
                    if (r.ok) document.getElementById('contributor-count').textContent = (await r.json()).length;
                } catch(e) {}

                renderFiles(allFiles);
            } catch (e) {
                el.innerHTML = '<div class="error">Could not load files. Check that the repo is public.</div>';
            }
        }

        function renderFiles(files) {
            const el = document.getElementById('file-list');
            if (!files.length) {
                el.innerHTML = '<div class="empty">No reports yet.</div>';
                return;
            }

            const ul = document.createElement('ul');
            ul.className = 'files';

            files.forEach(f => {
                const li = document.createElement('li');
                const a = document.createElement('a');
                a.href = BASE + f.name;
                a.target = '_blank';

                const name = f.name.replace('.html', '').replace(/[-_]/g, ' ').replace(/\b\w/g, c => c.toUpperCase());
                const size = f.size > 1024 * 1024
                    ? (f.size / (1024 * 1024)).toFixed(1) + ' MB'
                    : f.size > 1024
                    ? (f.size / 1024).toFixed(0) + ' KB'
                    : f.size + ' B';

                a.innerHTML = `<span>${name}</span><span class="meta">${size}</span>`;
                li.appendChild(a);
                ul.appendChild(li);
            });

            el.innerHTML = '';
            el.appendChild(ul);
        }

        function filterFiles() {
            const q = document.getElementById('search').value.toLowerCase();
            renderFiles(allFiles.filter(f => f.name.toLowerCase().includes(q)));
        }

        loadFiles();
    </script>
</body>
</html>
